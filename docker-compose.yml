version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "5000:80"
    environment:
      - MONGO_CONN=mongodb://mongo:27017
      - REDIS_CONN=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - ASPNETCORE_ENVIRONMENT=Development
      - USE_EF=true
      - ConnectionStrings__Sqlite=Data Source=/data/inventory.db
    depends_on:
      - mongo
      - redis
      - rabbitmq
    volumes:
      - sqlite-data:/data

  mongo:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7.0
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mongo-data:
  sqlite-data:
